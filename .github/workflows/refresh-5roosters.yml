name: Refresh 5 Roosters Dashboard

on:
  schedule:
    # Every day at 06:00 UTC (08:00 Cairo time)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      date_preset:
        description: 'Meta date preset (ignored if since/until provided)'
        type: choice
        default: 'last_30d'
        options:
          - last_7d
          - last_14d
          - last_30d
          - last_90d
          - this_month
          - last_month
      time_range_since:
        description: 'Custom start date YYYY-MM-DD (optional, overrides preset)'
        type: string
        required: false
      time_range_until:
        description: 'Custom end date YYYY-MM-DD (optional, overrides preset)'
        type: string
        required: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Write env file from secrets
        run: |
          cat > 5roosters_meta.env <<EOF
          META_APP_ID=${{ secrets.META_APP_ID }}
          META_APP_SECRET=${{ secrets.META_APP_SECRET }}
          META_ACCESS_TOKEN=${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID=${{ secrets.META_AD_ACCOUNT_ID }}
          EOF

      - name: Pull Meta data
        env:
          DATE_PRESET: ${{ github.event.inputs.date_preset || 'last_30d' }}
          TIME_RANGE_SINCE: ${{ github.event.inputs.time_range_since }}
          TIME_RANGE_UNTIL: ${{ github.event.inputs.time_range_until }}
        run: python3 pull_5roosters.py

      - name: Build dashboard
        run: python3 build_5roosters_dashboard.py

      - name: Stage Netlify deploy bundle
        run: |
          mkdir -p dist/netlify/functions
          cp 5roosters_media_dashboard.html dist/index.html
          cp netlify/functions/refresh-5roosters.js dist/netlify/functions/refresh-5roosters.js
          cat > dist/netlify.toml <<'EOF'
          [build]
            publish = "."
            functions = "netlify/functions"
          EOF

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npx --yes netlify-cli@latest deploy \
            --prod \
            --dir=dist \
            --message="refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Cleanup secrets file
        if: always()
        run: rm -f 5roosters_meta.env 5roosters_data.json
